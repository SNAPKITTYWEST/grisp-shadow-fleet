<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Orchestrator · SnapKitty</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --green: #00ff88;
    --amber: #ffaa00;
    --red: #ff4455;
    --blue: #4488ff;
    --dim: #444466;
    --text: #ccccdd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; font-size: 13px; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo { color: var(--green); font-size: 15px; font-weight: bold; }
  .subtitle { color: var(--dim); font-size: 11px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 1px;
    background: var(--border);
    height: calc(100vh - 45px);
  }

  .panel {
    background: var(--surface);
    padding: 14px;
    overflow: auto;
  }

  .panel-title {
    color: var(--dim);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .chain-event {
    border-left: 2px solid var(--green);
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 11px;
  }
  .chain-event.deny { border-left-color: var(--red); }
  .chain-event.route { border-left-color: var(--amber); }

  .seal { color: var(--dim); font-size: 10px; word-break: break-all; }
  .tick { color: var(--green); }
  .agent { color: var(--blue); }
  .verdict-allow { color: var(--green); }
  .verdict-deny { color: var(--red); }
  .verdict-route { color: var(--amber); }

  .stones { grid-column: 1 / -1; }

  .stone {
    display: inline-block;
    border: 1px solid var(--border);
    padding: 8px 12px;
    margin: 4px;
    font-size: 11px;
  }
  .stone .model { color: var(--amber); }
  .stone .built { color: var(--dim); }

  input[type=text] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: monospace;
    font-size: 12px;
    width: 300px;
  }
  button {
    background: var(--border);
    border: 1px solid var(--dim);
    color: var(--green);
    padding: 6px 14px;
    font-family: monospace;
    cursor: pointer;
    font-size: 12px;
  }
  button:hover { background: var(--dim); }

  .verify-result { margin-top: 8px; font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="status-dot"></div>
  <div class="logo">◈ SHADOW ORCHESTRATOR</div>
  <div class="subtitle">Inverted NoShow Turbo3X · SnapKitty Collective · Governance Overlay</div>
</header>

<div class="grid">

  <!-- WORM Chain -->
  <div class="panel">
    <div class="panel-title">⛓ WORM Chain — Append Only</div>
    <div id="worm-chain">
      <div style="color:var(--dim);font-size:11px">No events yet. Submit an action to begin.</div>
    </div>
  </div>

  <!-- Live State -->
  <div class="panel">
    <div class="panel-title">◈ Live State</div>
    <div id="state-display">
      <div style="color:var(--dim);font-size:11px">Genesis state loaded.</div>
    </div>

    <br>
    <div class="panel-title" style="margin-top:10px">⚡ Submit Action</div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <input type="text" id="agent-id" placeholder="agent ID" value="agent-001">
      <input type="text" id="action-type" placeholder="action type" value="QUERY">
      <input type="text" id="payload" placeholder="payload" value="hello world">
      <button onclick="submitAction()">SUBMIT TICK</button>
    </div>
    <br>
    <button onclick="verifyChain()" style="margin-right:8px">VERIFY CHAIN</button>
    <button onclick="resetChain()">RESET</button>
    <div id="verify-result" class="verify-result"></div>
  </div>

  <!-- Stones -->
  <div class="panel stones">
    <div class="panel-title">🪨 Signed Stones — Model Credit</div>
    <div id="stones-display">
      <div style="color:var(--dim);font-size:11px">No stones yet. Models sign here after build.</div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <input type="text" id="stone-model" placeholder="model name e.g. gpt-4o / claude-sonnet-4-6">
      <input type="text" id="stone-pages" placeholder="pages built e.g. 01-state,02-governance">
      <button onclick="signStone()">SIGN STONE</button>
    </div>
  </div>

</div>

<script>
// ── Shadow Orchestrator Runtime (browser, no deps) ──

const GENESIS_SEAL = 'SHADOW_GENESIS:WORM_CHAIN_INIT';
let chain = JSON.parse(localStorage.getItem('shadow-worm') || '{"events":[],"genesis":"' + hash(GENESIS_SEAL) + '"}');
let tick = parseInt(localStorage.getItem('shadow-tick') || '0');
let stones = JSON.parse(localStorage.getItem('shadow-stones') || '[]');

// ── Simple hash (djb2) — Codex: replace with SubtleCrypto SHA-256
function hash(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) + h) ^ s.charCodeAt(i);
    h = h >>> 0;
  }
  return h.toString(16).padStart(8,'0') + s.length.toString(16).padStart(4,'0');
}

function computeSeal(event, parentSeal) {
  return hash(JSON.stringify({ index:event.index, tick:event.tick, agentId:event.agentId, actionType:event.actionType, verdict:event.verdict, parentSeal }));
}

function lastSeal() {
  if (!chain.events.length) return chain.genesis;
  return chain.events[chain.events.length-1].seal;
}

// ── Hard deny: crisis language
const CRISIS_TERMS = ['suicide','self-harm','end my life','kill myself'];
function hardDeny(payload) {
  return CRISIS_TERMS.some(t => payload.toLowerCase().includes(t));
}

function submitAction() {
  tick++;
  const agentId = document.getElementById('agent-id').value || 'agent-001';
  const actionType = document.getElementById('action-type').value || 'QUERY';
  const payload = document.getElementById('payload').value || '';

  // Governance check
  let verdict = 'ALLOW';
  if (hardDeny(payload)) {
    verdict = 'ROUTE_TO_HUMAN';
  }

  const parentSeal = lastSeal();
  const event = {
    index: chain.events.length,
    tick,
    timestamp: new Date().toISOString(),
    agentId,
    actionType,
    actionId: 'action-' + Math.random().toString(36).slice(2,9),
    verdict,
    parentSeal,
    seal: ''
  };
  event.seal = computeSeal(event, parentSeal);
  chain.events.push(event);

  localStorage.setItem('shadow-worm', JSON.stringify(chain));
  localStorage.setItem('shadow-tick', String(tick));
  render();
}

function verifyChain() {
  let prev = chain.genesis;
  for (const event of chain.events) {
    const expected = computeSeal(event, prev);
    if (expected !== event.seal) {
      document.getElementById('verify-result').innerHTML =
        '<span style="color:var(--red)">✗ BROKEN at index ' + event.index + '</span>';
      return;
    }
    prev = event.seal;
  }
  document.getElementById('verify-result').innerHTML =
    '<span style="color:var(--green)">✓ CHAIN VALID — ' + chain.events.length + ' events</span>';
}

function resetChain() {
  chain = { events: [], genesis: hash(GENESIS_SEAL) };
  tick = 0;
  localStorage.setItem('shadow-worm', JSON.stringify(chain));
  localStorage.setItem('shadow-tick', '0');
  render();
}

function signStone() {
  const model = document.getElementById('stone-model').value;
  const pages = document.getElementById('stone-pages').value;
  if (!model) return;
  const stone = {
    model,
    pages: pages || 'unspecified',
    tick,
    wormSeal: lastSeal(),
    timestamp: new Date().toISOString(),
  };
  stones.push(stone);
  localStorage.setItem('shadow-stones', JSON.stringify(stones));
  render();
}

function render() {
  // WORM chain
  const chainEl = document.getElementById('worm-chain');
  if (!chain.events.length) {
    chainEl.innerHTML = '<div style="color:var(--dim);font-size:11px">No events yet.</div>';
  } else {
    chainEl.innerHTML = [...chain.events].reverse().slice(0,20).map(e => `
      <div class="chain-event ${e.verdict==='ALLOW'?'':'deny'}">
        <span class="tick">[T${e.tick}]</span>
        <span class="agent"> ${e.agentId}</span>
        → <span class="${e.verdict==='ALLOW'?'verdict-allow':'verdict-deny'}">${e.verdict}</span>
        <span style="color:var(--dim)"> ${e.actionType}</span>
        <div class="seal">${e.seal}</div>
      </div>`).join('');
  }

  // State
  document.getElementById('state-display').innerHTML = `
    <div>Tick: <span class="tick">${tick}</span></div>
    <div>Events: <span class="tick">${chain.events.length}</span></div>
    <div>Last seal: <span class="seal">${lastSeal()}</span></div>
  `;

  // Stones
  const stonesEl = document.getElementById('stones-display');
  if (!stones.length) {
    stonesEl.innerHTML = '<div style="color:var(--dim);font-size:11px">No stones yet.</div>';
  } else {
    stonesEl.innerHTML = stones.map(s => `
      <div class="stone">
        <span class="model">◈ ${s.model}</span>
        <span class="built"> · pages: ${s.pages} · tick ${s.tick}</span>
        <div class="seal">${s.wormSeal}</div>
      </div>`).join('');
  }
}

render();
</script>
</body>
</html>
